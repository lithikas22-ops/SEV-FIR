<!DOCTYPE html>
<html>
<head>
<title>Crime Details</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="card">
<h2>Crime Details</h2>

<select id="crime">
<option>Cyber Stalking</option>
<option>Cyber Harassment</option>
<option>Cyber Abuse</option>
<option>Hacking</option>
<option>Cyber Bullying</option>
<option>Identity Theft</option>
<option>Online Fraud</option>
<option>Phishing</option>
<option>Data Breach</option>
<option>Fake Profile</option>
</select>

<input type="date" id="date">
<input type="time" id="time">

<select id="loss">
<option>No Loss</option>
<option>Below 10,000</option>
<option>10,000 - 50,000</option>
<option>Above 50,000</option>
</select>

<select id="reported">
<option>No</option>
<option>Yes</option>
</select>

<button onclick="saveCrime()">Next</button>
</div>

<script src="script.js"></script>
</body>
</html>
